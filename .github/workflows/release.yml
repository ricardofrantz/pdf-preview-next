name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm run format:check
          npm run lint
          npm run typecheck
          xvfb-run -a npm test
          npm audit --omit=dev --audit-level=high

      - name: Package VSIX
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx @vscode/vsce package --out "pdf-preview-next-${VERSION}.vsix"
          node ./tools/scan_vsix.mjs "pdf-preview-next-${VERSION}.vsix"

      - name: Upload VSIX artifact for guarded publishing
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pdf-preview-next-vsix
          path: pdf-preview-next-*.vsix
          if-no-files-found: error

      - name: Upload GitHub release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VSIX="$(ls pdf-preview-next-*.vsix | head -n 1)"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$VSIX" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$VSIX" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi

  publish-marketplaces:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    # Configure this environment with required reviewers in GitHub repository settings.
    environment:
      name: marketplace-publish
      url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pdf-preview-next-vsix
          path: .

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: |
          VSIX="$(ls pdf-preview-next-*.vsix | head -n 1)"
          npx @vscode/vsce publish --packagePath "$VSIX" -p "$VSCE_PAT"

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: |
          VSIX="$(ls pdf-preview-next-*.vsix | head -n 1)"
          npx --yes ovsx publish "$VSIX" -p "$OVSX_PAT"

      - name: Note skipped registry publishing
        if: env.VSCE_PAT == '' || env.OVSX_PAT == ''
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VS Code Marketplace publish skipped: VSCE_PAT is not configured."
          fi
          if [ -z "$OVSX_PAT" ]; then
            echo "Open VSX publish skipped: OVSX_PAT is not configured."
          fi
