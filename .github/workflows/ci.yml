name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Compile test runtime
        run: npm run compile

      - name: Check PDF.js runtime compatibility
        run: npm run test:compat

      - name: Test VSIX scanner
        run: npm run package:scan:test

      - name: Test
        run: xvfb-run -a npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Package VSIX
        run: npx @vscode/vsce package --out pdf-preview-next-ci.vsix

      - name: Scan VSIX contents
        run: node ./tools/scan_vsix.mjs pdf-preview-next-ci.vsix
